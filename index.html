            excerpt:'The most fundamental prayer in Jainism — unique in that it pays homage not to deities, but to the spiritual qualities of liberated souls.',
            content:`<p>The Navkar Mantra is the most sacred prayer in all of Jainism. Its profound uniqueness lies in the fact that it does not petition a deity for personal favours. Instead, it pays homage to the five categories of supreme spiritual beings — the <strong>Panchparmeshthi</strong> — who have attained, or are on the path to, liberation.</p>
            <h3>The Five Supreme Beings</h3><ul>
            <li><strong>Namo Arihtanam</strong> — I bow to the Arihantas: Omniscient Living Tirthankaras who have conquered all inner passions.</li>
            <li><strong>Namo Siddhanam</strong> — I bow to the Siddhas: Liberated souls who reside in eternal, formless bliss.</li>
            <li><strong>Namo Ayarianam</strong> — I bow to the Acharyas: The heads of the Jain monastic order.</li>
            <li><strong>Namo Uvajjhayanam</strong> — I bow to the Upadhyayas: Teachers and scholars of the Jain scriptures.</li>
            <li><strong>Namo Loe Savva Sahunam</strong> — I bow to all Sadhus and Sadhvis in the world.</li></ul>
            <h3>The Concluding Verse</h3><p><em>"Eso Pancha Namukkaro, Savva Pavappanasano, Mangalanam Cha Savvesim, Padhamam Havai Mangalam"</em> — This fivefold salutation destroys all sins and is the foremost auspicious thing of all auspicious things.</p>
            <h3>The Philosophy Behind the Prayer</h3><p>The Navkar Mantra is a meditation on virtue, not a petition to power. By bowing to these five categories, the devotee acknowledges that liberation is achieved through one's own effort — guided by the example of those who have already walked the path. It is a declaration that moksha is universal, available to any soul willing to make the journey.</p>
            <blockquote>The Navkar Mantra is not merely a prayer — it is a map of the spiritual universe and our place within it.</blockquote>`

            content:`<p>Written by Acharya Umasvati approximately in the 2nd–5th century CE, the Tattvartha Sutra is the most universally accepted text in Jain philosophy. Its very first sutra states the path to liberation: <em>"Samyag-darsana-jnana-caritrani mokshamargah"</em> — Right faith, right knowledge, and right conduct constitute the path to liberation.</p>
            <h3>The Seven Fundamental Realities (Tattvas)</h3><ul>
            <li><strong>Jiva</strong> — The living soul, characterised by consciousness (chetana).</li>
            <li><strong>Ajiva</strong> — Non-living substances: matter, space, time, and the mediums of motion and rest.</li>
            <li><strong>Asrava</strong> — The influx of karmic matter into the soul through activity and passion.</li>
            <li><strong>Bandha</strong> — The bonding of karma particles to the soul.</li>
            <li><strong>Samvara</strong> — Cessation of new karmic influx through ethical practice and vows.</li>

            <li><strong>Moksha</strong> — Liberation: complete shedding of all karma and the soul's eternal freedom.</li></ul>
            <h3>Its Enduring Significance</h3><p>In just 344 aphorisms, the Tattvartha Sutra maps the entire Jain metaphysical and ethical system with extraordinary precision. It remains the most studied reference text for any serious student of Jain philosophy.</p>`

            content:`<p>In Jain philosophy, karma is a subtle, physical substance. Karmic particles exist throughout the universe and are attracted to the soul through its activities of mind, body, and speech — and particularly through the passions (kashaya): anger, pride, deceit, and greed.</p>
            <h3>The Eight Types of Karma</h3>
            <p><strong>Ghati Karma (Destructive)</strong> — These obscure or destroy the soul's natural qualities:</p><ul>

            <li><strong>Darshanavarniya</strong> — Perception-obscuring karma.</li>
            <li><strong>Mohaniya</strong> — Deluding karma: the most powerful; the primary root of all bondage.</li>
            <li><strong>Antaraya</strong> — Obstructing karma: blocks infinite energy and willpower.</li></ul>
            <p><strong>Aghati Karma (Non-Destructive)</strong> — These determine the circumstances of rebirth:</p><ul>
            <li><strong>Vedaniya</strong> — Determines the experience of pleasure and pain.</li>
            <li><strong>Namakarma</strong> — Determines the type of body and faculties.</li>
            <li><strong>Gotrakarma</strong> — Determines one's family and social environment.</li>
            <li><strong>Ayushyakarma</strong> — Determines the duration of each life.</li></ul>

            excerpt:'Twelve systematic themes for reflective meditation, each designed to loosen the soul\'s attachment to the world and kindle the fire of renunciation.',
            content:`<p>The Dvadasha Anuprekshas — the Twelve Contemplations — are a central practice across all Jain traditions. By meditating deeply on these twelve themes, the practitioner progressively loosens attachment to the world and develops an inner readiness for liberation.</p>
            <h3>The Twelve Contemplations</h3><ul>
            <li><strong>Anitya (Impermanence)</strong> — All worldly things are transient. What endures is the soul.</li>
            <li><strong>Asharana (Helplessness)</strong> — No external being can protect us from our karma. True refuge is within.</li>
            <li><strong>Samsara (The Cycle)</strong> — The soul has wandered through countless births. Liberation is the only true goal.</li>
            <li><strong>Ekatva (Aloneness)</strong> — The soul is alone in its journey and bears its karma alone.</li>
            <li><strong>Anyatva (Otherness)</strong> — The body and the soul are entirely separate. Do not identify with the body.</li>
            <li><strong>Ashuchi (Impurity)</strong> — Attachment to the body invites further bondage.</li>
            <li><strong>Asrava (Karmic Influx)</strong> — Contemplate how passions draw karma into the soul.</li>
            <li><strong>Samvara (Karmic Stoppage)</strong> — Contemplate the vows and practices that stop new karma.</li>
            <li><strong>Nirjara (Karmic Shedding)</strong> — Contemplate how austerities and equanimity shed existing karma.</li>
            <li><strong>Loka (The Universe)</strong> — Meditate on the vast Jain cosmos and the soul's place within it.</li>
            <li><strong>Bodhi-durlabha (Rarity of Enlightenment)</strong> — Human birth and access to the Dharma are extraordinarily rare. Do not waste this opportunity.</li>
            <li><strong>Dharma (The True Religion)</strong> — Meditate on the Jain path itself and gratitude to the Tirthankaras.</li></ul>`

            content:`<p>The Uttaradhyayana Sutra comprises 36 chapters traditionally believed to contain the last teachings of Bhagavan Mahavira — discourses delivered to his disciples before his liberation (Nirvana) at Pavapuri.</p>
            <h3>Key Chapters and Themes</h3><ul>
            <li><strong>Vinaya (Reverence)</strong> — Deep respect for the Guru is the foundation of all spiritual learning.</li>
            <li><strong>Karma Prakriti (Ch. 33)</strong> — A rigorous exposition of the eight types of karma, their causes, durations, and how they are shed.</li>
            <li><strong>The Tale of King Nami</strong> — A king renounces his kingdom on the eve of coronation to pursue liberation. All worldly power is empty compared to the freedom of the soul.</li>

            excerpt:'Perhaps Jainism\'s most unique philosophical gift to the world — the recognition that no single viewpoint can ever capture reality\'s complete truth.',
            content:`<p>Anekantavada — "the doctrine of many-sidedness" — holds that reality is complex and multifaceted, and that no single perspective can fully capture its truth. Every description of reality is only partially correct, valid from a specific standpoint.</p>
            <h3>The Elephant and the Blind Men</h3><p>The classic Jain parable: blind men each touching a different part of an elephant declare with certainty what it is — each correct from their own experience, each wrong in claiming complete truth. The liberated Jain sage sees all perspectives simultaneously without contradiction.</p>
            <h3>Syadvada: The Logic of Conditionals</h3><p>Anekantavada is expressed through <strong>Syadvada</strong> — conditional predication. Every statement must be qualified with "syat" (in some respect). The seven-fold predication (Saptabhangi) provides a rigorous logical structure for this.</p>
            <h3>Contemporary Relevance</h3><p>In a world of polarised opinion and ideological certainty, Anekantavada offers a profound alternative — the invitation to hold multiple truths simultaneously, to approach every disagreement with intellectual humility.</p>
            <blockquote>Anekantavada is the epistemological expression of ahimsa — non-violence applied to the realm of thought and discourse.</blockquote>`

            if (list && !vid) return `https://www.youtube.com/embed/videoseries?list=${list}&autoplay=1`;

    function getJulianDay(d) {
        const y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate(),A=Math.floor(y/100),B=2-A+Math.floor(A/4);
        return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+dd+B-1524.5;

    function calculateTithiData(date) {
        const JD=getJulianDay(date),T=(JD-2451545.0)/36525;
        const L0=(280.46646+36000.76983*T)%360;
        const Ms=((357.52911+35999.05029*T)%360)*Math.PI/180;
        const Cs=(1.914602-0.004817*T)*Math.sin(Ms)+0.019993*Math.sin(2*Ms);
        const sunLng=(L0+Cs+360)%360;
        const Lm=(218.3165+481267.8813*T)%360;
        const Mm=((134.9634+477198.8676*T)%360)*Math.PI/180;
        const Dr=((297.8502+445267.1115*T)%360)*Math.PI/180;
        const Fr=((93.2720+483202.0175*T)%360)*Math.PI/180;
        const moonLng=(Lm+6.289*Math.sin(Mm)+1.274*Math.sin(2*Dr-Mm)+0.658*Math.sin(2*Dr)+0.214*Math.sin(2*Mm)-0.186*Math.sin(Ms)-0.114*Math.sin(2*Fr)+360)%360;
        const elong=(moonLng-sunLng+360)%360;
        const ti=Math.floor(elong/12);
        const names=['Pratipada','Dwitiya','Tritiya','Chaturthi','Panchami','Shashthi','Saptami','Ashtami','Navami','Dashami','Ekadashi','Dwadashi','Trayodashi','Chaturdashi'];
        const paksha=ti<15?'Shukla':'Krishna';
        const idx=ti<15?ti:ti-15;
        const tithiName=ti===14?'Purnima':ti===29?'Amavasya':names[idx];
        return {paksha,tithiName};
    }
    function getVeerSamvatYear() {
        const t=new Date();
        return t>=new Date(t.getFullYear(),9,15)?t.getFullYear()+527:t.getFullYear()+526;
    }

        const today=new Date();today.setHours(0,0,0,0);
        return jainFestivals.filter(f=>f.date>=today).sort((a,b)=>a.date-b.date)[0]||null;
    }

    async function fetchSunriseSunset(lat,lng) {
        const sr=document.getElementById('sunriseTime'),ss=document.getElementById('sunsetTime'),
              nk=document.getElementById('navkarshiTime'),pr=document.getElementById('pratikramanTime');
        try {
            const res=await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`);
            const d=await res.json();
            if (d.status==='OK') {
                const sunrise=new Date(d.results.sunrise),sunset=new Date(d.results.sunset);
                const fmt=t=>t.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
                sr.textContent=fmt(sunrise); ss.textContent=fmt(sunset);
                if(nk)nk.textContent=fmt(new Date(sunrise.getTime()+48*60000));
                if(pr)pr.textContent=fmt(sunset);
            } else throw 0;
        } catch {
            sr.textContent='06:30 AM'; ss.textContent='06:45 PM';
            if(nk)nk.textContent='07:18 AM'; if(pr)pr.textContent='06:45 PM';
        }
    }
    function updatePanchang() {
        try {
            const {paksha,tithiName}=calculateTithiData(new Date());
            const el=id=>document.getElementById(id);
            if(el('vsYear'))       el('vsYear').textContent=getVeerSamvatYear();
            if(el('tithiPaksha'))  el('tithiPaksha').textContent=`${paksha} Paksha`;
            if(el('tithiDisplay')) el('tithiDisplay').textContent=tithiName;
            const f=getUpcomingFestival();
            if(f){
                if(el('nextFestivalName'))el('nextFestivalName').textContent=f.name;
                if(el('nextFestivalDate'))el('nextFestivalDate').textContent=f.date.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
            }
        } catch(e){console.error(e);}
    }
    async function updateDailyInfo() {
        const fallback={lat:19.0330,lng:73.0297,city:'Navi Mumbai'};
        const cityEl=document.getElementById('locationCity');
        updatePanchang();
        if(navigator.geolocation){
            navigator.geolocation.getCurrentPosition(
                async({coords:{latitude:lat,longitude:lng}})=>{
                    try{
                        const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=en`);
                        const d=await r.json();
                        if(cityEl)cityEl.textContent=d.city||'Your Location';
                    }catch{if(cityEl)cityEl.textContent='Your Location';}
                    fetchSunriseSunset(lat,lng);
                },
                ()=>{if(cityEl)cityEl.textContent=fallback.city;fetchSunriseSunset(fallback.lat,fallback.lng);}
            );
        } else {
            if(cityEl)cityEl.textContent=fallback.city;
            fetchSunriseSunset(fallback.lat,fallback.lng);
        }
    }

    // Audio controls
    playPauseBtn.addEventListener('click',()=>audioPlayer.paused?audioPlayer.play():audioPlayer.pause());
    backwardBtn.addEventListener('click',()=>audioPlayer.currentTime-=10);
    forwardBtn.addEventListener('click',()=>audioPlayer.currentTime+=10);
    closePlayerBtn.addEventListener('click',()=>{
        audioPlayer.pause();audioPlayer.src='';
        audioPlayerContainer.classList.remove('visible','expanded');
        currentTrackTitle.textContent='Select an audio';
        resetSpeed();
    });
    toggleScriptBtn.addEventListener('click',()=>{
        audioPlayerContainer.classList.toggle('expanded');
        toggleScriptIcon.innerHTML=audioPlayerContainer.classList.contains('expanded')?chevronUpPath:chevronDownPath;
    });
    audioPlayer.addEventListener('play',()=>playPauseIcon.innerHTML=pauseIconPath);
    audioPlayer.addEventListener('pause',()=>playPauseIcon.innerHTML=playIconPath);
    audioPlayer.addEventListener('loadedmetadata',()=>durationEl.textContent=formatTime(audioPlayer.duration));
    audioPlayer.addEventListener('timeupdate',()=>{
        currentTimeEl.textContent=formatTime(audioPlayer.currentTime);
        progressBar.style.width=`${(audioPlayer.currentTime/audioPlayer.duration)*100}%`;
    });
    progressBarContainer.addEventListener('click',e=>{audioPlayer.currentTime=(e.offsetX/progressBarContainer.clientWidth)*audioPlayer.duration;});

    // Volume
    volumeSlider.addEventListener('input',e=>{const v=parseFloat(e.target.value);audioPlayer.volume=v;isMuted=v===0;document.getElementById('volumeIcon').innerHTML=isMuted?volMutePath:volOnPath;});
    muteBtn.addEventListener('click',()=>{
        if(isMuted){audioPlayer.volume=prevVolume;volumeSlider.value=prevVolume;isMuted=false;document.getElementById('volumeIcon').innerHTML=volOnPath;}
        else{prevVolume=audioPlayer.volume;audioPlayer.volume=0;volumeSlider.value=0;isMuted=true;document.getElementById('volumeIcon').innerHTML=volMutePath;}
    });

    // Speed
    function resetSpeed(){document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active-speed'));const o=document.querySelector('.speed-btn[data-speed="1"]');if(o)o.classList.add('active-speed');audioPlayer.playbackRate=1;}
    document.querySelectorAll('.speed-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active-speed'));btn.classList.add('active-speed');audioPlayer.playbackRate=parseFloat(btn.dataset.speed);});
    });

    setActiveTab(null);
});
</script>
</body>
</html>
