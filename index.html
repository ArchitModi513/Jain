        /* ── Audio Player ── */
        #audioPlayerContainer {

            transform: translateY(100%);

            overflow: hidden;
        }
        #audioPlayerContainer.visible  { transform: translateY(0); }
        #audioPlayerContainer.expanded { max-height: 440px; }

        #scriptContent {
            height: 0; opacity: 0; overflow-y: auto;
            transition: all 0.4s ease-in-out;

            height: 160px; opacity: 1;
            margin-top: 0.5rem; margin-bottom: 0.5rem;

        .play-pause-btn:hover { box-shadow: 0 0 15px rgba(176, 141, 87, 0.4); }

            height: 4px; border-radius: 2px; outline: none; cursor: pointer;

            -webkit-appearance: none; appearance: none;

            border-radius: 50%; background: #B08D57; cursor: pointer;

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // ════════════════════════════════════════
        // CONTENT DATA
        // ════════════════════════════════════════

        const insights = [
            { quote: "Ahimsa is the highest duty.", source: "Mahavira Swami" },
            { quote: "Live and let live. Love and let love.", source: "Jain Proverb" },
            { quote: "Silence and self-control is non-violence.", source: "Mahavira Swami" },
            { quote: "The essence of wisdom is to not injure any living being.", source: "Jain Scripture" },
            { quote: "Have compassion towards all living beings. Hatred leads to ruin.", source: "Mahavira Swami" }
        ];

        const dailyIntentions = [
            { theme: "Kshama (Forgiveness)", prompt: "Reflect on a moment where you can practice forgiveness, for others or for yourself." },
            { theme: "Satya (Truthfulness)", prompt: "Consider how you can express your truth with compassion and kindness today." },
            { theme: "Aparigraha (Non-possessiveness)", prompt: "Identify one attachment, physical or emotional, you can release today for greater peace." },
            { theme: "Ahimsa (Non-violence)", prompt: "Practice non-violence in your thoughts, words, and actions towards all beings." },
            { theme: "Brahmacharya (Self-Control)", prompt: "Focus on conserving your energy for spiritual growth and avoiding sensual indulgence." },
            { theme: "Maitri (Friendliness)", prompt: "Extend a feeling of friendship and goodwill to everyone you encounter today." },

                content: `
                    <p>The Navkar Mantra, also known as the Namaskar Mantra, is the most sacred prayer in all of Jainism. Its profound uniqueness lies in the fact that it does not petition a deity for personal favours. Instead, it pays homage to the five categories of supreme spiritual beings — the <strong>Panchparmeshthi</strong> — who have attained, or are on the path to, liberation.</p>
                    <h3>The Five Supreme Beings</h3>
                    <ul>

                        <li><strong>Namo Ayarianam</strong> — I bow to the Acharyas: The heads of the Jain monastic order, guardians of the fourfold community.</li>

                    <p>The prayer concludes: <em>"Eso Pancha Namukkaro, Savva Pavappanasano, Mangalanam Cha Savvesim, Padhamam Havai Mangalam"</em> — "This fivefold salutation destroys all sins and is the foremost auspicious thing of all auspicious things."</p>
                    <h3>The Philosophy Behind the Prayer</h3>
                    <p>The Navkar Mantra is a meditation on virtue, not a petition to power. By bowing to these five categories, the devotee acknowledges that liberation is achieved through one's own effort — guided by the example of those who have already walked the path. It is a declaration that moksha is universal, available to any soul willing to make the journey.</p>

                    <p>The Navkar Mantra can be recited at any time and in any place — it requires no ritual purity. It is traditionally chanted at dawn during morning Pratikraman, before meals, at the start of any auspicious activity, and as a continuous silent meditation throughout the day. The 108 repetitions using a mala is a beloved devotional practice.</p>

                    <p>The Dvadasha Anuprekshas — the Twelve Contemplations, also called Bhavanas — are a central practice across all Jain traditions. By meditating deeply on these twelve themes, the practitioner progressively loosens attachment to the world, diminishes the passions, and develops a profound inner readiness for the path of liberation.</p>
                    <h3>The Twelve Contemplations</h3>
                    <ul>
                        <li><strong>Anitya (Impermanence)</strong> — All worldly things are transient. Wealth, relationships, youth, and even the body — all pass away. What endures is the soul.</li>
                        <li><strong>Asharana (Helplessness)</strong> — No external being — god, guru, or family — can ultimately protect us from the results of our own karma. True refuge is within.</li>
                        <li><strong>Samsara (The Cycle)</strong> — The soul has wandered through countless births in all forms of life. The cycle of rebirth is suffering; liberation is the only true goal.</li>
                        <li><strong>Ekatva (Aloneness)</strong> — The soul is alone in its spiritual journey. It arrived alone, it acts alone, and it bears the fruits of its karma alone.</li>
                        <li><strong>Anyatva (Otherness)</strong> — The body and the soul are entirely separate entities. The soul's nature is pure consciousness; do not identify with the body.</li>

                    <h3>How to Practice</h3>

                readTime: '6 min',
                content: `
                    <p>Anekantavada — literally "the doctrine of many-sidedness" or "non-one-sidedness" — is one of Jainism's most sophisticated and distinctive philosophical contributions. It holds that reality is complex and multifaceted, and that no single perspective can ever fully capture its truth. Every description of reality is only partially correct, valid from a specific standpoint.</p>
                    <h3>The Elephant and the Blind Men</h3>
                    <p>The classic Jain parable illustrates this beautifully: blind men each touching a different part of an elephant declare with certainty — "It is a rope!" "It is a pillar!" "It is a wall!" — each correct from their own experience, each wrong in claiming complete truth. The liberated Jain sage, by contrast, sees all perspectives simultaneously without contradiction.</p>
                    <h3>Syadvada: The Logic of Conditionals</h3>
                    <p>Anekantavada is expressed in practice through <strong>Syadvada</strong> — the doctrine of conditional predication. Every statement about reality must be qualified with "syat" (in some respect / from some perspective). The seven-fold predication (Saptabhangi) provides a rigorous logical structure:</p>
                    <ul>
                        <li><em>Syad asti</em> — In some respect, it is.</li>
                        <li><em>Syad nasti</em> — In some respect, it is not.</li>
                        <li><em>Syad asti nasti</em> — In some respect, it both is and is not.</li>
                        <li><em>Syad avaktavyam</em> — In some respect, it is inexpressible.</li>
                        <li>— and three further combinations of the above.</li>
                    </ul>
                    <h3>Nayavada: The Seven Partial Viewpoints</h3>
                    <p><strong>Nayavada</strong> complements Syadvada by classifying seven primary "nayas" — partial standpoints ranging from the most general (the substantial standpoint: viewing a thing as a whole) to the most specific (the precise standpoint: viewing a thing only in its current actual state). Each naya is valid within its scope; each becomes false when claimed as the whole truth.</p>
                    <h3>Contemporary Relevance</h3>
                    <p>In a world of polarised opinion and ideological certainty, Anekantavada offers a profound alternative. The invitation to hold multiple truths simultaneously, to approach every disagreement with intellectual humility and genuine curiosity about the other's perspective, is both ancient wisdom and urgent modern need.</p>
                    <blockquote>Anekantavada is the epistemological expression of ahimsa — non-violence applied to the realm of thought and discourse.</blockquote>

        function formatTime(s) {
            if (isNaN(s)) return '00:00';
            const m = Math.floor(s / 60), sec = Math.floor(s % 60);
            return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

        // ════════════════════════════════════════
        // TITHI / PANCHANG CALCULATION
        // ════════════════════════════════════════
        function getJulianDay(date) {
            const y = date.getFullYear(), m = date.getMonth() + 1, d = date.getDate();
            const A = Math.floor(y / 100);
            const B = 2 - A + Math.floor(A / 4);
            return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5;
        }

        function calculateTithiData(date) {
            const JD = getJulianDay(date);
            const T  = (JD - 2451545.0) / 36525;

            // Sun
            const L0     = (280.46646 + 36000.76983 * T) % 360;
            const M_s    = ((357.52911 + 35999.05029 * T) % 360) * Math.PI / 180;
            const C_s    = (1.914602 - 0.004817 * T) * Math.sin(M_s) + 0.019993 * Math.sin(2 * M_s) + 0.000289 * Math.sin(3 * M_s);
            const sunLng = (L0 + C_s + 360) % 360;

            // Moon (simplified)
            const Lm     = (218.3165 + 481267.8813 * T) % 360;
            const Mm_r   = ((134.9634 + 477198.8676 * T) % 360) * Math.PI / 180;
            const D_r    = ((297.8502 + 445267.1115 * T) % 360) * Math.PI / 180;
            const F_r    = ((93.2720  + 483202.0175 * T) % 360) * Math.PI / 180;
            const moonLng = (Lm
                + 6.289 * Math.sin(Mm_r)
                + 1.274 * Math.sin(2 * D_r - Mm_r)
                + 0.658 * Math.sin(2 * D_r)
                + 0.214 * Math.sin(2 * Mm_r)
                - 0.186 * Math.sin(M_s)
                - 0.114 * Math.sin(2 * F_r) + 360) % 360;

            const elongation  = (moonLng - sunLng + 360) % 360;
            const tithiIndex  = Math.floor(elongation / 12); // 0–29

            const names = ['Pratipada','Dwitiya','Tritiya','Chaturthi','Panchami','Shashthi','Saptami','Ashtami','Navami','Dashami','Ekadashi','Dwadashi','Trayodashi','Chaturdashi'];
            const paksha      = tithiIndex < 15 ? 'Shukla' : 'Krishna';
            const idxInPaksha = tithiIndex < 15 ? tithiIndex : tithiIndex - 15;
            let   tithiName;

            if      (tithiIndex === 14) tithiName = 'Purnima';
            else if (tithiIndex === 29) tithiName = 'Amavasya';
            else                        tithiName = names[idxInPaksha];

            return { paksha, tithiName };
        }

        function getVeerSamvatYear() {
            const today = new Date();
            // Approximate: Jain New Year follows Diwali (~mid-Oct each year)
            const diwaliCutoff = new Date(today.getFullYear(), 9, 15);
            return today >= diwaliCutoff ? today.getFullYear() + 527 : today.getFullYear() + 526;
        }

            const today = new Date(); today.setHours(0,0,0,0);
            return jainFestivals

        }

        async function fetchSunriseSunset(lat, lng) {
            const srEl  = document.getElementById('sunriseTime');
            const ssEl  = document.getElementById('sunsetTime');
            const nkEl  = document.getElementById('navkarshiTime');
            const prEl  = document.getElementById('pratikramanTime');
            try {
                const res  = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`);
                const data = await res.json();
                if (data.status === 'OK') {
                    const sr = new Date(data.results.sunrise);
                    const ss = new Date(data.results.sunset);
                    const fmt = d => d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
                    srEl.textContent = fmt(sr);
                    ssEl.textContent = fmt(ss);
                    if (nkEl) nkEl.textContent = fmt(new Date(sr.getTime() + 48 * 60 * 1000));
                    if (prEl) prEl.textContent = fmt(ss);
                } else throw new Error('API error');
            } catch {
                srEl.textContent = '06:30 AM';
                ssEl.textContent = '06:45 PM';
                if (nkEl) nkEl.textContent = '07:18 AM';
                if (prEl) prEl.textContent = '06:45 PM';
            }
        }

        function updatePanchang() {
            const tithiPakshaEl     = document.getElementById('tithiPaksha');
            const tithiEl           = document.getElementById('tithiDisplay');
            const vsYearEl          = document.getElementById('vsYear');
            const festivalNameEl    = document.getElementById('nextFestivalName');
            const festivalDateEl    = document.getElementById('nextFestivalDate');

            try {
                const { paksha, tithiName } = calculateTithiData(new Date());
                if (vsYearEl)       vsYearEl.textContent       = getVeerSamvatYear();
                if (tithiPakshaEl)  tithiPakshaEl.textContent  = `${paksha} Paksha`;
                if (tithiEl)        tithiEl.textContent        = tithiName;

                const festival = getUpcomingFestival();
                if (festival) {
                    if (festivalNameEl) festivalNameEl.textContent = festival.name;
                    if (festivalDateEl) festivalDateEl.textContent = festival.date.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
                }
            } catch (err) {
                console.error('Panchang calculation error:', err);
                if (tithiEl) tithiEl.textContent = 'Data unavailable';
            }
        }

                        try {
                            const r    = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=en`);
                            const data = await r.json();
                            if (cityEl) cityEl.textContent = data.city || 'Your Location';
                        } catch { if (cityEl) cityEl.textContent = 'Your Location'; }
                        proceed(latitude, longitude);
                    },
                    () => {
                        if (cityEl) cityEl.textContent = fallbackCity;
                        proceed(fallback.lat, fallback.lng);
                    }
                );
            } else {
                if (cityEl) cityEl.textContent = fallbackCity;
                proceed(fallback.lat, fallback.lng);
            }
        }

        // ════════════════════════════════════════
        // INIT — NAV + SECTIONS
        // ════════════════════════════════════════
        const categoryMeta = {
            pachchkaan:  { title: 'Pachchkaan',          desc: 'Select a Pachchkaan to listen to the audio oath for your chosen fast.',                                   type: 'audio' },
            stotras:     { title: 'Stotras',             desc: 'Listen to sacred hymns and devotional prayers.',                                                         type: 'audio' },
            stavans:     { title: 'Stavans & Bhajans',   desc: 'Devotional hymns and songs in praise of the Jinas and the liberated ones.',                             type: 'audio' },
            sutras:      { title: 'Sutras',              desc: 'Explore the sacred Agamas — the foundational scriptures of Jainism — through recitations and teachings.',type: 'audio' },
            lectures:    { title: 'Lectures',            desc: 'Spiritual discourses and pravachans on Jain philosophy and practice.',                                   type: 'audio' },
            meditation:  { title: 'Meditation',          desc: 'Guided Jain meditation practices — from Preksha Dhyana to Samosharan visualisation.',                    type: 'audio' },
            scriptures:  { title: 'Scriptures & Learning', desc: 'In-depth articles and lessons on the Agamas, Jain philosophy, and the path to liberation.',           type: 'scripture' },
            mangalik:    { title: 'Mangalik',            desc: 'Auspicious recitations for blessings and well-being.',                                                   type: 'audio' },
            pratikraman: { title: 'Pratikraman',         desc: 'Audio for the daily and periodic rituals of repentance and reflection.',                                 type: 'audio' },
            samayik:     { title: 'Samayik',             desc: 'Audio for the practice of equanimity — 48 minutes of stillness and inner peace.',                        type: 'audio' }
        };

        const makeNavBtn = (target, label) =>
            `<button class="nav-btn py-4 px-1 border-b-2 border-transparent text-gray-500 hover:text-rustic-gold hover:border-rustic-gold whitespace-nowrap text-sm" data-target="${target}">${label}</button>`;

        navContainerDesktop.innerHTML += makeNavBtn('', 'Home');
        navContainerMobile.innerHTML  += makeNavBtn('', 'Home');
        createHomepage();

        for (const key in categoryMeta) {
            const meta = categoryMeta[key];
            navContainerDesktop.innerHTML += makeNavBtn(key, meta.title);
            navContainerMobile.innerHTML  += makeNavBtn(key, meta.title);

            const section = createSection(key, meta.title, meta.desc);
            mainContent.appendChild(section);

            const data    = meta.type === 'scripture' ? scripturesData : (audioData[key] || []);
            const factory = meta.type === 'scripture' ? createScriptureCard : createAudioCard;
            renderGrid(document.getElementById(`${key}Grid`), data, factory);
        }

        // ════════════════════════════════════════
        // EVENT LISTENERS
        // ════════════════════════════════════════

        // Nav
        [navContainerDesktop, navContainerMobile].forEach(c => {
            c.addEventListener('click', (e) => {
                if (e.target.classList.contains('nav-btn'))
                    setActiveTab(e.target.dataset.target || null);
            });
        });

        // Search
        function handleSearch(term) {
            const q = term.toLowerCase().trim();
            if (!q) {
                let ss = document.getElementById('search-section');
                if (ss) ss.style.display = 'none';
                setActiveTab(currentTab);
                return;
            }
            const results = getAllAudioItems().filter(i =>
                (i.title || '').toLowerCase().includes(q) ||
                (i.description || '').toLowerCase().includes(q)
            );
            document.querySelectorAll('.page-section').forEach(s => s.style.display = 'none');
            let ss = document.getElementById('search-section');
            if (!ss) { ss = createSection('search', 'Search Results', ''); mainContent.appendChild(ss); }
            ss.querySelector('h2').textContent = `Search Results for "${term}"`;
            ss.style.display = 'block';
            renderGrid(document.getElementById('searchGrid'), results);
        }

        searchInputDesktop.addEventListener('input', e => handleSearch(e.target.value));
        searchInputMobile.addEventListener('input',  e => handleSearch(e.target.value));

        openMobileSearchBtn.addEventListener('click', () => {
            mobileSearchOverlay.classList.remove('hidden');
            setTimeout(() => mobileSearchOverlay.classList.add('opacity-100'), 10);
            searchInputMobile.focus();
        });
        closeMobileSearchBtn.addEventListener('click', () => {
            mobileSearchOverlay.classList.remove('opacity-100');
            setTimeout(() => mobileSearchOverlay.classList.add('hidden'), 300);
            handleSearch('');
        });

        // Content area delegated clicks
        mainContent.addEventListener('click', function(e) {
            // Audio play
            const playBtn = e.target.closest('.play-btn');
            if (playBtn) {
                const title = playBtn.dataset.title;
                const item  = getAllAudioItems().find(i => i.title === title);
                if (item && item.audioSrc !== '#') {
                    audioPlayer.src = item.audioSrc;
                    audioPlayer.playbackRate = parseFloat(document.querySelector('.speed-btn.active-speed')?.dataset.speed || 1);
                    currentTrackTitle.textContent = item.title;
                    scriptContent.textContent     = item.script || 'No script available.';
                    audioPlayer.play();
                    audioPlayerContainer.classList.add('visible');
                    if (item.script) {
                        audioPlayerContainer.classList.add('expanded');
                        toggleScriptIcon.innerHTML = chevronUpPath;
                    } else {
                        audioPlayerContainer.classList.remove('expanded');
                        toggleScriptIcon.innerHTML = chevronDownPath;
                    }
                }
            }
            // Article read
            const readBtn = e.target.closest('.read-article-btn');
            if (readBtn) {
                const article = scripturesData.find(a => a.id === readBtn.dataset.articleId);
                if (article) openArticleModal(article);
            }
        });

        // Contact form
        const contactForm = document.getElementById('contact-form');
        if (contactForm) {
            contactForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = contactForm.querySelector('button[type="submit"]');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Submitting...';
                try {
                    const r = await fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams(new FormData(contactForm)).toString() });
                    if (r.ok) {
                        document.getElementById('contact-section-container').innerHTML = `
                            <div class="text-center py-16">
                                <h2 class="font-serif text-3xl font-bold text-deep-blue mb-4">Thank You!</h2>
                                <p class="max-w-md mx-auto text-gray-600">Your feedback has been received. We appreciate you helping us improve this sanctuary.</p>
                            </div>`;
                    } else throw new Error('Failed');
                } catch {
                    const p = document.createElement('p');
                    p.className = 'text-center text-red-500 mt-4 text-sm';
                    p.textContent = 'Sorry, there was an issue. Please try again later.';
                    contactForm.appendChild(p);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Feedback';
                }
            });
        }

        // Audio player controls
        playPauseBtn.addEventListener('click', () => audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause());
        backwardBtn.addEventListener('click', () => audioPlayer.currentTime -= 10);
        forwardBtn.addEventListener('click',  () => audioPlayer.currentTime += 10);

        closePlayerBtn.addEventListener('click', () => {
            audioPlayer.pause();
            audioPlayer.src = '';
            audioPlayerContainer.classList.remove('visible', 'expanded');
            currentTrackTitle.textContent = 'Select an audio';
            resetSpeedButtons();
        });

        toggleScriptBtn.addEventListener('click', () => {
            audioPlayerContainer.classList.toggle('expanded');
            toggleScriptIcon.innerHTML = audioPlayerContainer.classList.contains('expanded') ? chevronUpPath : chevronDownPath;
        });

        audioPlayer.addEventListener('play',  () => playPauseIcon.innerHTML = pauseIconPath);
        audioPlayer.addEventListener('pause', () => playPauseIcon.innerHTML = playIconPath);
        audioPlayer.addEventListener('loadedmetadata', () => durationEl.textContent = formatTime(audioPlayer.duration));
        audioPlayer.addEventListener('timeupdate', () => {
            currentTimeEl.textContent     = formatTime(audioPlayer.currentTime);
            progressBar.style.width       = `${(audioPlayer.currentTime / audioPlayer.duration) * 100}%`;
        });

        progressBarContainer.addEventListener('click', (e) => {
            audioPlayer.currentTime = (e.offsetX / progressBarContainer.clientWidth) * audioPlayer.duration;
        });

        // Volume
        volumeSlider.addEventListener('input', (e) => {
            const v = parseFloat(e.target.value);
            audioPlayer.volume = v;
            isMuted = v === 0;
            document.getElementById('volumeIcon').innerHTML = isMuted ? volMutePath : volOnPath;
        });

        muteBtn.addEventListener('click', () => {
            if (isMuted) {
                audioPlayer.volume = prevVolume;
                volumeSlider.value = prevVolume;
                isMuted = false;
                document.getElementById('volumeIcon').innerHTML = volOnPath;
            } else {
                prevVolume = audioPlayer.volume;
                audioPlayer.volume = 0;
                volumeSlider.value = 0;
                isMuted = true;
                document.getElementById('volumeIcon').innerHTML = volMutePath;
            }
        });

        // Speed
        function resetSpeedButtons() {
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active-speed'));
            const oneX = document.querySelector('.speed-btn[data-speed="1"]');
            if (oneX) oneX.classList.add('active-speed');
            audioPlayer.playbackRate = 1;
        }

        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active-speed'));
                btn.classList.add('active-speed');
                audioPlayer.playbackRate = parseFloat(btn.dataset.speed);
            });
        });

        // ── Show homepage on load ──
        setActiveTab(null);
    });
    </script>
</body>
</html>
